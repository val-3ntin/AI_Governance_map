name: Monthly regulation ingest

on:
  schedule:
    # 06:00 UTC on the 1st of each month
    - cron: "0 6 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Run ingest
        run: python -m ai_gov_map.ingest -v

      - name: Run tests
        run: pytest -q

      - name: Commit updated CSV if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/regulation_data.csv
          if git diff --staged --quiet; then
            echo "No regulation_data.csv changes to commit."
          else
            git commit -m "chore(ingest): refresh regulation_data.csv"
            git push
          fi
